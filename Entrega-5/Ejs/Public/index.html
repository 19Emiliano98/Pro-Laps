<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios de Ingreso</title>
</head>
<body>

    <h2>Ingrese producto</h2>
    <form action="/productos" method="POST">
        Producto: <input type="text" name="title">
        Precio: <input type="text" name="price">
        Imagen: <input type="text" name="thumbnail">
        <button>Send</button>
    </form>

    <button onclick="location.assign('/productos/ejs')">Ver Productos</button>

</body>
</html>
